[tool.ruff]
line-length = 100
target-version = "py312"
src = ["app", "tests"]
extend-exclude = ["venv", "tmp", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["E402"]
"app/test_*.py" = ["E402"]
"run_tests.py" = ["E402"]
